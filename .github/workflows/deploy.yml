name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run generate --workspace=packages/database

      - name: Build all workspaces
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Build each service individually
          docker build -f apps/app1/Dockerfile -t pacbel2022/reaproveitando-componentes:app1-latest .
          docker build -f apps/app2/Dockerfile -t pacbel2022/reaproveitando-componentes:app2-latest .
          docker build -f apps/app3/Dockerfile -t pacbel2022/reaproveitando-componentes:app3-latest .
          docker build -f packages/api/Dockerfile -t pacbel2022/reaproveitando-componentes:api-latest .

          # Push all images
          docker push pacbel2022/reaproveitando-componentes:app1-latest
          docker push pacbel2022/reaproveitando-componentes:app2-latest
          docker push pacbel2022/reaproveitando-componentes:app3-latest
          docker push pacbel2022/reaproveitando-componentes:api-latest

    - name: Clean up
      run: |
        docker system prune -f